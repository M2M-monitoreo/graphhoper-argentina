services:
  graphhopper:
    build:
      context: .
      dockerfile: Dockerfile
    image: tu-usuario/graphhopper-argentina:latest

    container_name: graphhopper-argentina

    ports:
      - "8989:8989"

    environment:
      # Memoria JVM — ajustá según tu servidor
      # Para un servidor con 4 GB RAM, podés subir a -Xmx3g
      JAVA_OPTS: "-Xmx2g -Xms2g"

    # El contenedor reinicia solo si falla (no si lo detenés manualmente)
    restart: unless-stopped

    # Healthcheck: verifica que la API responda
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8989/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

# ─────────────────────────────────────────────────────────────────────────────
# MODOS DE USO:
#
# 1. Construir y levantar la imagen autosuficiente:
#    docker compose up --build
#
# 2. Si ya subiste la imagen a un registry:
#    docker compose up
# ─────────────────────────────────────────────────────────────────────────────